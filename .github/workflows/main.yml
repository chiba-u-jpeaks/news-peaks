name: Generate News Data
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate News JSON
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all', 
              per_page: 10
            });
            const fs = require('fs');
            const newsData = issues.data.map(issue => {
              // 改良版：Markdown形式、HTML形式、または直リンクの画像URLを徹底的に探す
              const imgRegex = /(https?:\/\/[^ \n\r\t)]+\.(?:png|jpe?g|gif|webp|svg|bmp))/i;
              const imgMatch = issue.body ? issue.body.match(imgRegex) : null;
              
              // 画像が見つからなかった時のために、Issueの本文そのものをログに出す（デバッグ用）
              if(!imgMatch) console.log("No image found in issue: " + issue.title);

              return {
                title: issue.title,
                link: issue.html_url,
                date: issue.created_at,
                image: imgMatch ? imgMatch[0] : 'https://placehold.jp/24/004488/ffffff/400x300.png?text=No%20Image'
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news_data.json
          git commit -m "Update news data" || exit 0
          git push
