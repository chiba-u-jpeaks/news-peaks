name: Generate News Data
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate News JSON
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 10
            });
            const fs = require('fs');
            const newsData = issues.data.map(issue => {
              // 【究極の解決策】
              // 本文の中から http... で始まり画像拡張子で終わる文字列を、記号を無視して抽出
              const regex = /https?:\/\/[^\s"'<>)]+\.(?:png|jpe?g|gif|webp|svg)/i;
              const match = (issue.body || "").match(regex);
              
              return {
                title: issue.title,
                link: issue.html_url,
                date: issue.created_at,
                image: match ? match[0] : 'https://placehold.jp/400x300.png?text=No+Image'
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news_data.json
          git commit -m "Update news data" || exit 0
          git push
