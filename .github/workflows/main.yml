name: Generate News Data
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate News JSON
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all', 
              per_page: 10
            });
            const fs = require('fs');
            const newsData = issues.data.map(issue => {
              const body = issue.body || "";
              
              // 【最強の画像抽出ルール】
              // 1. HTMLのsrc="..." を探す
              // 2. Markdownの ![..](...) を探す
              // 3. 直接貼られた画像URLを探す
              const htmlMatch = body.match(/src=["']([^"']+\.(?:png|jpe?g|gif|webp|svg))["']/i);
              const mdMatch = body.match(/!\[.*?\]\((https?:\/\/[^ \n\r\t)]+\.(?:png|jpe?g|gif|webp|svg))\)/i);
              const rawMatch = body.match(/(https?:\/\/[^ \n\r\t)]+\.(?:png|jpe?g|gif|webp|svg|bmp))/i);
              
              let foundImg = null;
              if (htmlMatch) foundImg = htmlMatch[1];
              else if (mdMatch) foundImg = mdMatch[1];
              else if (rawMatch) foundImg = rawMatch[1];

              return {
                title: issue.title,
                link: issue.html_url,
                date: issue.created_at,
                image: foundImg || 'https://placehold.jp/24/004488/ffffff/400x300.png?text=No%20Image'
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news_data.json
          git commit -m "Update news data" || exit 0
          git push
