script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            const fs = require('fs');
            const newsData = issues.map(i => {
              // 本文の1行目を「アイキャッチ」として取得する
              const lines = (i.body || "").split(/\r?\n/);
              const firstLine = lines[0] ? lines[0].trim() : "";
              
              // 1行目が http から始まっていればそれを採用、なければ予備画像
              const eyeCatch = firstLine.startsWith('http') ? firstLine : "https://placehold.jp/400x300.png?text=No+Image";

              return {
                title: i.title,
                link: i.html_url,
                date: i.created_at,
                image: eyeCatch
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
