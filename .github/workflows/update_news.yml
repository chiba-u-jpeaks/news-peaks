name: Final News Sync
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create JSON
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            const fs = require('fs');
            const newsData = issues.map(i => {
              // どんな記号に囲まれていても、https://...png(等) を抜き出す
              const match = (i.body || "").match(/https?:\/\/[^\s"'<>)]+\.(?:png|jpe?g|gif|webp|svg)/i);
              return {
                title: i.title,
                link: i.html_url,
                date: i.created_at,
                image: match ? match[0] : "FAILED"
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news_data.json
          git commit -m "New robot start" || exit 0
          git push
