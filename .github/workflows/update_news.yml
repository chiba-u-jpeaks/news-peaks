name: Final News Sync
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create JSON
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            const fs = require('fs');
            const newsData = issues.map(i => {
              const fullBody = i.body || "";
              const lines = fullBody.split(/\r?\n/);
              const firstLine = lines[0] || "";
              const urlMatch = firstLine.match(/https?:\/\/[^\s"'<>)]+/);
              const eyeCatch = urlMatch ? urlMatch[0] : "https://placehold.jp/400x300.png?text=No+Image";

              return {
                id: i.number,
                title: i.title,
                date: i.created_at,
                image: eyeCatch,
                content: fullBody // 詳細ページで使うために「本文」という名前で保存
              };
            });
            fs.writeFileSync('news_data.json', JSON.stringify(newsData, null, 2));
      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news_data.json
          git commit -m "Fixed SyntaxError and added content field" || exit 0
          git push
